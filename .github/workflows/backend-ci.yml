name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build
        run: ./mvnw clean compile -B

      - name: Test
        run: ./mvnw test -B -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci-test-secret-base64-key-at-least-32-characters-long
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8081
          GOOGLE_CLIENT_ID: fake-ci-client-id
          GOOGLE_CLIENT_SECRET: fake-ci-client-secret
          MAIL_NAME: test@example.com
          MAIL_PASSWORD: fake-password
          DATABASE_USER: sa
          DATABASE_PASSWORD: ""
          DATABASE_URL: jdbc:h2:mem:testdb

      - name: Package JAR
        run: ./mvnw package -B -DskipTests

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
