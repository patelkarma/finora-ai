# -------------------------------
# ai-service — minimal Spring Boot worker
# -------------------------------
spring.application.name=ai-service

# Render injects PORT as an env var even for non-HTTP services
# (the actuator endpoint binds to it for health probing).
server.port=${PORT:8082}
server.address=0.0.0.0

# -------------------------------
# RabbitMQ
# -------------------------------
# CloudAMQP URL format: amqps://user:pass@host/vhost
# Spring Boot parses this into all the individual settings.
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@localhost:5672/}

# Listener concurrency — single thread is fine on the free tier;
# Gemini is the bottleneck, not us.
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=2
spring.rabbitmq.listener.simple.prefetch=4

# -------------------------------
# Gemini
# -------------------------------
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# -------------------------------
# Resilience4j — same defaults as backend so a sick Gemini fails fast
# from either side of the split.
# -------------------------------
resilience4j.circuitbreaker.instances.llm.sliding-window-size=10
resilience4j.circuitbreaker.instances.llm.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.llm.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.llm.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.llm.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.llm.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.llm.record-exceptions=com.project.aiService.llm.LlmUnavailableException

resilience4j.retry.instances.llm.max-attempts=2
resilience4j.retry.instances.llm.wait-duration=500ms
resilience4j.retry.instances.llm.retry-exceptions=com.project.aiService.llm.LlmUnavailableException

# -------------------------------
# Actuator — Render uses /actuator/health to keep the dyno alive.
# -------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Logging — quiet rabbit/spring chatter, keep our package at INFO.
logging.level.org.springframework.amqp=WARN
logging.level.com.rabbitmq=WARN
logging.level.com.project.aiService=INFO
