# Test profile — used by Spring Boot tests (-Dspring.profiles.active=test)
# Overrides the prod application.properties so tests don't need real Postgres,
# Gmail, OAuth or Gemini credentials.

# H2 in-memory DB in PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:finora-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Tests own the schema via Hibernate create-drop; Flyway is disabled here.
spring.flyway.enabled=false

# Fixtures for env-driven config
jwt.secret=test-secret-base64-key-that-is-at-least-32-characters-long
frontend.url=http://localhost:3000

# Fake OAuth client — Spring Security OAuth requires these to be present
spring.security.oauth2.client.registration.google.client-id=test-client
spring.security.oauth2.client.registration.google.client-secret=test-secret

# Fake mail config — JavaMailSender is auto-configured but never actually used
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.from=test@example.com

# LLM defaults to Ollama for tests; tests that exercise LLM logic mock the provider
llm.provider=ollama
gemini.api-key=

# RAG disabled in tests — H2 has no pgvector extension. The conditional
# components in com.project.financeDashboard.service.rag never instantiate,
# so ChatService runs without RagService and falls back to recent-N.
rag.enabled=false

# RabbitMQ disabled in tests — the messaging beans are conditional, so they
# never instantiate. We also exclude RabbitAutoConfiguration alongside Redis
# auto-config so Spring doesn't try to dial localhost:5672 / 6379 on context
# load.
messaging.enabled=false

# No Redis in tests — Spring Cache uses an in-memory fallback. Disable Redis
# + Rabbit auto-config so the test context doesn't try to connect to remote
# brokers it doesn't have.
spring.cache.type=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Sentry: no DSN in tests so the SDK no-ops. (Belt-and-suspenders — the
# main config already defaults sentry.dsn to empty.)
sentry.dsn=
sentry.enabled=false
