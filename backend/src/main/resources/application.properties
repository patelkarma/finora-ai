# -------------------------------
# Application Name
# -------------------------------
spring.application.name=backend

# -------------------------------
# Server Configuration
# -------------------------------
server.address=0.0.0.0
server.port=${PORT:8081}

# -------------------------------
# MySQL Database Configuration
# -------------------------------
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}

# HikariCP — stay within Clever Cloud free tier limit of 5 connections
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# -------------------------------
# JPA / Hibernate Configuration
# -------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# -------------------------------
# Logging Configuration
# -------------------------------
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=WARN

# -------------------------------
# JWT Configuration
# -------------------------------
jwt.secret=${JWT_SECRET}

# -------------------------------
# Frontend URL (used by OAuth handler)
# -------------------------------
frontend.url=${FRONTEND_URL}

# -------------------------------
# Ollama Configuration
# -------------------------------
# ollama.model=phi3:mini
# ollama.url=http://localhost:11434

# =============================
# GOOGLE OAUTH CONFIG (FIXED)
# =============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:https://finora-backend-rnd0.onrender.com}/login/oauth2/code/google

spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# =============================
# EMAIL (SMTP) - OTP SYSTEM
# =============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_NAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_NAME}


otp.expiration=300000
