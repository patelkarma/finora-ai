# -------------------------------
# Application Name
# -------------------------------
spring.application.name=backend

# -------------------------------
# Server Configuration
# -------------------------------
server.address=0.0.0.0
server.port=${PORT:8081}

# -------------------------------
# PostgreSQL Database Configuration (Supabase)
# -------------------------------
# DATABASE_URL example: jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — Supabase session pooler comfortably handles a small pool.
# Tune up later if you need more concurrency.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# -------------------------------
# JPA / Hibernate Configuration
# -------------------------------
# DDL is owned by Flyway. Hibernate validates that the live schema matches
# the entity model on startup. Override DDL_AUTO=update via env var if you
# ever need Hibernate to silently add a missing column (e.g. an emergency).
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# -------------------------------
# Flyway — schema migrations
# -------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Existing production DBs are baselined at V1 on first run; only V2+ apply.
# Fresh DBs run all migrations from V1.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Initial schema captured at Flyway adoption
# We don't use Flyway's ${...} placeholder substitution; disabling avoids
# false positives when SQL comments reference Spring property keys.
spring.flyway.placeholder-replacement=false

# -------------------------------
# Logging Configuration
# -------------------------------
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=WARN
logging.level.org.flywaydb=INFO

# -------------------------------
# JWT Configuration
# -------------------------------
jwt.secret=${JWT_SECRET}

# -------------------------------
# Frontend URL (used by OAuth handler)
# -------------------------------
frontend.url=${FRONTEND_URL}

# -------------------------------
# LLM Provider Configuration
# -------------------------------
# Active provider: "gemini" (default, free tier) or "ollama" (local self-hosted)
llm.provider=${LLM_PROVIDER:gemini}

# Google Gemini (https://aistudio.google.com — get a free API key)
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# Ollama (local development only — Render free tier cannot host a 7B model)
ollama.url=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:mistral:7b}

# -------------------------------
# Resilience4j: circuit breaker + retry around the LLM call
# -------------------------------
resilience4j.circuitbreaker.instances.llm.sliding-window-size=10
resilience4j.circuitbreaker.instances.llm.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.llm.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.llm.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.llm.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.llm.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.llm.record-exceptions=com.project.financeDashboard.service.llm.LlmUnavailableException

resilience4j.retry.instances.llm.max-attempts=2
resilience4j.retry.instances.llm.wait-duration=500ms
resilience4j.retry.instances.llm.retry-exceptions=com.project.financeDashboard.service.llm.LlmUnavailableException

# =============================
# GOOGLE OAUTH CONFIG (FIXED)
# =============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:https://finora-backend-rnd0.onrender.com}/login/oauth2/code/google

spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# =============================
# EMAIL (SMTP) - OTP SYSTEM
# =============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_NAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_NAME}


otp.expiration=300000

# -------------------------------
# Password reset
# -------------------------------
password.reset.ttl-minutes=30

# -------------------------------
# Actuator Configuration
# -------------------------------
# Expose only health and info endpoints. Health detail visible when authorized.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Build/git info surfaced in /actuator/info
management.info.env.enabled=true
info.app.name=@project.name@
info.app.version=@project.version@

# -------------------------------
# Springdoc / Swagger UI
# -------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
