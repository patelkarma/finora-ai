# Dev profile overrides — loaded when SPRING_PROFILES_ACTIVE=dev
#
# This is a convenience for running against a local Docker Postgres without
# setting env vars. For real local dev, prefer the .env file (auto-loaded
# by spring-dotenv) which can point at your Supabase project.
#
# To start a local Postgres:
#   docker run -p 5432:5432 -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=finora postgres:15

spring.datasource.url=jdbc:postgresql://localhost:5432/finora
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# Local frontend
frontend.url=http://localhost:3000

# JWT — must be set via env var or .env (see backend/.env.example)
jwt.secret=${JWT_SECRET:REPLACE_ME_WITH_BASE64_32_BYTE_SECRET}

# SQL logging (helpful locally)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# Mail (empty defaults — OTP email won't work unless you provide real creds)
spring.mail.username=${MAIL_NAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Ollama (optional — AI Insights degrades gracefully if not running)
ollama.url=http://localhost:11434
ollama.model=mistral:7b
