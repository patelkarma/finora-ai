# Dev profile overrides — loaded when SPRING_PROFILES_ACTIVE=dev

# Local MySQL (createDatabaseIfNotExist auto-creates finora_dev)
spring.datasource.url=jdbc:mysql://localhost:3306/finora_dev?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# Local frontend
frontend.url=http://localhost:3000

# JWT — must be set via env var or .env.local (see below)
jwt.secret=${JWT_SECRET:REPLACE_ME_WITH_BASE64_32_BYTE_SECRET}

# SQL logging (helpful locally)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# Mail (empty defaults — OTP email won't work unless you provide real creds)
spring.mail.username=${MAIL_NAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Ollama (optional — AI Insights degrades gracefully if not running)
ollama.url=http://localhost:11434
ollama.model=mistral:7b
